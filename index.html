<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Control Panel</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="admin-container">
        <div class="header">
            <h2>Live Timer Control</h2>
            <h1 id="admin-time">00:00</h1>
            <p>Status: <strong id="admin-status">Idle</strong></p>
        </div>

        <div class="input-group">
            <input type="number" id="input-min" placeholder="Menit" min="0" value="0">
            <span style="color: white; font-size: 1.5rem; line-height: 2.5rem;">:</span>
            <input type="number" id="input-sec" placeholder="Detik" min="0" max="59" value="0">
            <button id="btn-set-time">Set Waktu</button>
        </div>

        <div class="presets">
            <button class="preset-btn" data-time="60">+ 1 Menit</button>
            <button class="preset-btn" data-time="180">+ 3 Menit</button>
            <button class="preset-btn" data-time="300">+ 5 Menit</button>
            <button class="preset-btn" data-time="30">+ 30 Detik</button>
        </div>

        <div class="controls">
            <button class="success" id="btn-toggle-timer">Start / Pause</button>
            <button class="danger" id="btn-reset-timer">Reset</button>
            <button id="btn-toggle-visibility">Munculkan / Sembunyikan Overlay</button>
        </div>
    </div>

   <script type="module" src="admin.js"></script>
</body>
</html>
