<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Timer Overlay</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="overlay-body">
    
    <div class="notch" id="notch">
        <div class="timer-label" id="label">START TIME</div>
        <div class="timer-display" id="time-display">00:00</div>
    </div>

    <audio id="alarm-audio" src="alarm.mp3" preload="auto"></audio>

    <script src="overlay.js"></script>
</body>
</html>
